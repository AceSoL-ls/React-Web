version: '3.8'

services:
  leaderboard-db:
    image: postgres:15-alpine
    container_name: gamer_postgres_db
    environment:
      POSTGRES_USER: gamer_admin
      POSTGRES_PASSWORD: super_secret_password123
      POSTGRES_DB: leaderboard_data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: